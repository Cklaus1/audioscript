# AudioScript configuration
# Run `audioscript init` for guided setup, or `audioscript check` to verify.

# Core settings
output_dir: "./output"
tier: "draft"                    # draft (fast), balanced (turbo), high_quality (large-v3)

# LLM analysis — set API key env var to enable AI summaries, titles, action items
# Provider options: anthropic (ANTHROPIC_API_KEY), nim (NVIDIA_API_KEY), openai (OPENAI_API_KEY)
# llm_provider: "nim"
# llm_model: "qwen/qwen3-next-80b-a3b-instruct"  # 6x faster than Claude, best speaker ID

# Speaker diarization — set HF_TOKEN env var to enable
# diarize: true

# Sync — auto-transcribe new audio files from watched directories
# sync:
#   sources:
#     - path: "C:\\Users\\yourname\\OneDrive\\Documents\\Sound Recordings"
#       tier: balanced
#       diarize: true
#   output_dir: "./transcripts/sync"
#   output_format: markdown
#   minotes:
#     enabled: false
#     folder: "Transcripts"
