# AudioScript configuration
# Run `audioscript init` for guided setup, or `audioscript check` to verify.

# Core settings
output_dir: "./output"
tier: "draft"                    # draft (fast), balanced (turbo), high_quality (large-v3)

# LLM analysis — set ANTHROPIC_API_KEY env var to enable AI summaries, titles, action items
# llm_model: "claude-sonnet-4-6"  # claude-sonnet-4-6 (default), claude-haiku-4-5-20251001 (cheaper)

# Speaker diarization — set HF_TOKEN env var to enable
# diarize: true

# Sync — auto-transcribe new audio files from watched directories
# sync:
#   sources:
#     - path: "C:\\Users\\yourname\\OneDrive\\Documents\\Sound Recordings"
#       tier: balanced
#       diarize: true
#   output_dir: "./transcripts/sync"
#   output_format: markdown
#   minotes:
#     enabled: false
#     folder: "Transcripts"
